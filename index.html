<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amorè N' More — Wedding Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+Myanmar:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:      #C9A96E;
  --gold-light:#E8D5B0;
  --ink:       #0D0A07;
  --crimson:   #7A1515;
}

@keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
@keyframes rise   { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
@keyframes glow   { 0%,100%{opacity:.6} 50%{opacity:1} }

body {
  background: #F7F0E8;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans Myanmar', sans-serif;
  font-weight: 400;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 65% 55% at 50% 50%, rgba(122,21,21,.04) 0%, transparent 70%);
  pointer-events: none;
}

/* Decorative rings */
.ring {
  position: fixed; border-radius: 50%;
  transform: translate(-50%,-50%); left: 50%; top: 50%;
  pointer-events: none;
}
.r1 { width: 480px; height: 480px; border: 1px solid rgba(122,21,21,.07); }
.r2 { width: 720px; height: 720px; border: 1px solid rgba(122,21,21,.04); }
.r3 { width: 980px; height: 980px; border: 1px solid rgba(122,21,21,.025); }

.top-line {
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(122,21,21,.50), transparent);
}

/* Card */
.card {
  text-align: center; padding: 0 28px;
  position: relative; z-index: 1;
}
.brand {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px,5.5vw,40px); font-style: italic; font-weight: 400;
  color: #3D0C0C;
  animation: rise .9s .1s both;
  margin-bottom: 3px;
}
.brand-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(8px,1.6vw,10px); letter-spacing: 5px; text-transform: uppercase;
  color: rgba(122,21,21,.45);
  animation: rise .9s .22s both;
  margin-bottom: 48px;
}

/* Ornament */
.orn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 40px; animation: rise .9s .32s both;
}
.orn-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(122,21,21,.32)); }
.orn-line.r { background: linear-gradient(90deg, rgba(122,21,21,.32), transparent); }
.orn-dot { width: 4px; height: 4px; background: var(--crimson); transform: rotate(45deg); opacity: .50; }

/* "Studio is opened!" */
.opened-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(9px,1.8vw,11px); letter-spacing: 5px; text-transform: uppercase;
  color: rgba(122,21,21,.70);
  animation: rise .9s .40s both;
  margin-bottom: 14px;
}
.opened-script {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(42px,9vw,70px);
  color: #A0271F;
  animation: rise .9s .48s both, glow 3s 1.5s ease-in-out infinite;
  line-height: 1.2;
  margin-bottom: 36px;
}

/* CTA */
.cta-wrap {
  animation: rise .9s .58s both;
  margin-bottom: 44px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.cta {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(9px,1.8vw,11px); letter-spacing: 3.5px; text-transform: uppercase;
  color: #F7F0E8;
  background: var(--crimson);
  border: 1px solid var(--crimson);
  padding: 13px 36px;
  text-decoration: none;
  transition: background .25s;
}
.cta:hover { background: #A0271F; border-color: #A0271F; }
.cta-outline {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(9px,1.8vw,11px); letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--crimson);
  background: transparent;
  border: 1px solid rgba(122,21,21,.40);
  padding: 13px 36px;
  text-decoration: none;
  transition: background .25s, border-color .25s, color .25s;
}
.cta-outline:hover { background: var(--crimson); border-color: var(--crimson); color: #F7F0E8; }

/* Floating petal */
.petal {
  display: block; font-size: 20px;
  animation: float 4.5s ease-in-out infinite, rise .9s .68s both;
  margin-bottom: 40px;
}

.info {
  font-family: 'Noto Sans Myanmar', sans-serif;
  font-size: clamp(10px,1.7vw,12px); letter-spacing: 1px;
  color: rgba(122,21,21,.45);
  animation: rise .9s .76s both;
  line-height: 2.4;
}
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <div class="card">
    <div class="brand">Amorè N' More</div>
    <div class="brand-sub">Wedding Studio &nbsp;·&nbsp; Tokyo</div>

    <div class="orn">
      <div class="orn-line"></div>
      <div class="orn-dot"></div>
      <div class="orn-line r"></div>
    </div>

    <div class="opened-label">Announcement</div>
    <div class="opened-script">Studio is opened!</div>

    <div class="cta-wrap">
      <a class="cta" href="studioOpensNow/">RSVP to our Grand Opening &nbsp;→</a>
      <a class="cta-outline" href="bookings/">Book an Appointment &nbsp;→</a>
    </div>

    <span class="petal">🌸</span>

    <div class="info">
      Saturday, 27 June 2026 &nbsp;·&nbsp; 11:00 AM<br>
      Sengoku, Bunkyoku, Tokyo
    </div>
  </div>
</body>
</html>
