<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amorè N' More — Wedding Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+Myanmar:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:       #C9A96E;
  --gold-light: #E8D5B0;
  --gold-pale:  #F6EDD9;
  --ink:        #0D0A07;
  --ink2:       #1C1410;
  --cream:      #FAF6F0;
}

@keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes shimmer { 0%{background-position:-300% center} 100%{background-position:300% center} }
@keyframes rise    { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

body {
  background: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans Myanmar', sans-serif;
  overflow: hidden;
}

/* Subtle radial glow */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,169,110,0.07) 0%, transparent 70%);
  pointer-events: none;
}

/* Rotating ring decorations */
.ring {
  position: fixed;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.10);
  transform: translate(-50%,-50%);
  left: 50%; top: 50%;
  pointer-events: none;
}
.ring-1 { width: 520px; height: 520px; border-color: rgba(201,169,110,0.08); }
.ring-2 { width: 760px; height: 760px; border-color: rgba(201,169,110,0.05); }
.ring-3 { width: 1020px; height: 1020px; border-color: rgba(201,169,110,0.03); }

/* Top gold line */
.top-line {
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.card {
  text-align: center;
  padding: 0 24px;
  position: relative; z-index: 1;
}

.brand {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 6vw, 44px);
  font-style: italic;
  font-weight: 400;
  color: var(--gold-light);
  animation: rise .9s .1s both;
  margin-bottom: 4px;
}

.brand-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(8px, 1.8vw, 11px);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(201,169,110,0.45);
  animation: rise .9s .25s both;
  margin-bottom: 52px;
}

/* Ornament */
.ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 52px;
  animation: rise .9s .35s both;
}
.ornament-line {
  width: 70px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.40));
}
.ornament-line.r {
  background: linear-gradient(90deg, rgba(201,169,110,0.40), transparent);
}
.ornament-diamond {
  width: 5px; height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.60;
}

.coming-soon {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(9px, 2vw, 12px);
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--gold);
  animation: rise .9s .42s both;
  margin-bottom: 22px;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px, 4vw, 28px);
  font-style: italic;
  font-weight: 400;
  color: rgba(255,255,255,0.82);
  line-height: 1.5;
  animation: rise .9s .50s both;
  margin-bottom: 20px;
}

.sub {
  font-family: 'Noto Sans Myanmar', sans-serif;
  font-size: clamp(10px, 2vw, 12px);
  font-weight: 300;
  color: rgba(255,255,255,0.32);
  line-height: 2.0;
  animation: rise .9s .58s both;
  margin-bottom: 52px;
}

/* Floating petal */
.petal {
  font-size: 22px;
  display: block;
  animation: float 4s ease-in-out infinite, rise .9s .68s both;
  margin-bottom: 48px;
}

.contact {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(9px, 1.8vw, 11px);
  letter-spacing: 2px;
  color: rgba(201,169,110,0.42);
  animation: rise .9s .74s both;
  line-height: 2.2;
}
.contact a {
  color: rgba(201,169,110,0.55);
  text-decoration: none;
  transition: color .2s;
}
.contact a:hover { color: var(--gold-light); }
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="card">
    <div class="brand">Amorè N' More</div>
    <div class="brand-sub">Wedding Studio &nbsp;·&nbsp; Tokyo</div>

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>

    <div class="coming-soon">Coming Soon</div>
    <div class="headline">
      Something beautiful<br>is being prepared for you.
    </div>
    <div class="sub">
      ကျွန်ုပ်တို့ရဲ့ Wedding Studio ကို အသစ်ပြောင်းလဲနေပါတယ်။<br>
      မကြာမီ ပြန်လည် တွေ့ဆုံနိုင်မှာပါ။
    </div>

    <span class="petal">🌸</span>

    <div class="contact">
      Facebook &nbsp;·&nbsp; Amorè N' More<br>
      <a href="mailto:studio@amorenmore.com">studio@amorenmore.com</a>
    </div>
  </div>
</body>
</html>
