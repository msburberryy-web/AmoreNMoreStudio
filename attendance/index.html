<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance — Amorè N' More Studio</title>
<meta property="og:title"       content="Attendance — Amorè N' More Studio">
<meta property="og:description" content="Staff & Client Attendance Check-in">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&family=Padauk:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:       #C9A96E;
  --gold-light: #E8D5B0;
  --gold-pale:  #F6EDD9;
  --ink:        #0D0A07;
  --ink2:       #1C1410;
  --cream:      #FAF6F0;
  --ivory:      #F4EDE3;
  --text:       #2A1E12;
  --muted:      #7A6050;
  --crimson:    #7A1515;
  --crimson2:   #A0271F;
  --green:      #2E7D52;
  --green-bg:   #EAF5EF;
  --warn:       #7A5C00;
  --warn-bg:    #FFF8E6;
  --err:        #8B1A1A;
  --err-bg:     #FFF0F0;
}

html { -webkit-font-smoothing: antialiased; }
body {
  background: var(--ivory);
  font-family: 'Padauk', 'Myanmar Text', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ══ TOP BAR ══ */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: rgba(244,237,227,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(201,169,110,.2);
}
.brand {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-style: italic;
  color: var(--crimson); text-decoration: none;
}
.brand span {
  font-family: 'Cormorant Garamond', serif;
  font-style: normal; font-size: 10px;
  letter-spacing: 4px; text-transform: uppercase;
  color: rgba(122,21,21,.45);
  display: block; margin-top: 1px;
}
.back-link {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); text-decoration: none; transition: color .2s;
}
.back-link:hover { color: var(--crimson); }

/* ══ MAIN ══ */
main {
  padding: 100px 16px 60px;
  display: flex; flex-direction: column; align-items: center;
}

.page-title {
  font-family: 'Great Vibes', cursive;
  font-size: 42px; color: var(--crimson);
  text-align: center; margin-bottom: 4px;
}
.page-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--muted); text-align: center; margin-bottom: 32px;
}

/* ══ CARD ══ */
.card {
  background: white;
  border: 1px solid rgba(201,169,110,.25);
  border-radius: 16px;
  box-shadow: 0 4px 32px rgba(0,0,0,.07);
  width: 100%; max-width: 440px;
  padding: 36px 32px;
  position: relative;
}

/* ══ STEPS ══ */
.step { display: none; }
.step.active { display: block; animation: fadeUp .35s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══ STEP HEADER ══ */
.step-icon {
  font-size: 32px; text-align: center; margin-bottom: 6px; line-height: 1;
}
.step-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; text-align: center;
  color: var(--ink); margin-bottom: 4px;
}
.step-desc {
  font-size: 13px; color: var(--muted);
  text-align: center; margin-bottom: 24px;
}

/* ══ QR SCANNER ══ */
#qr-reader {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  background: var(--ink);
  display: none;
  position: relative;
  aspect-ratio: 1;
  max-height: 280px;
}
#qr-reader video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.qr-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.qr-frame {
  width: 200px; height: 200px;
  border: 2px solid rgba(255,255,255,.7);
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,.45);
}

.scan-btn {
  width: 100%;
  padding: 12px 0;
  background: var(--ink2);
  color: #fff;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
  border: none; border-radius: 10px;
  cursor: pointer; transition: background .2s;
  margin-bottom: 8px;
}
.scan-btn:hover { background: var(--crimson); }
.scan-btn.active { background: var(--crimson); }

/* ══ DIVIDER ══ */
.divider {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin: 18px 0 16px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(201,169,110,.3);
}

/* ══ INPUTS ══ */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}
input[type="text"],
input[type="datetime-local"],
select {
  width: 100%; padding: 11px 14px;
  font-family: 'Padauk', sans-serif; font-size: 14px;
  color: var(--text);
  background: var(--ivory);
  border: 1.5px solid rgba(201,169,110,.4);
  border-radius: 8px;
  outline: none; transition: border-color .2s;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus { border-color: var(--crimson); }

/* ══ PRIMARY BUTTON ══ */
.btn-primary {
  width: 100%;
  padding: 14px 0;
  background: var(--crimson);
  color: #fff;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; letter-spacing: 2.5px; text-transform: uppercase;
  border: none; border-radius: 10px;
  cursor: pointer; transition: background .2s, transform .1s;
  margin-top: 4px;
}
.btn-primary:hover { background: var(--crimson2); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled {
  background: var(--muted); cursor: not-allowed; opacity: .6;
}

/* ══ LINK BUTTON ══ */
.btn-link {
  width: 100%; padding: 10px 0;
  background: none; border: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); cursor: pointer; text-align: center;
  transition: color .2s; margin-top: 8px;
}
.btn-link:hover { color: var(--crimson); }

/* ══ TIME TYPE TOGGLE ══ */
.toggle-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 20px;
}
.toggle-btn {
  padding: 12px 0;
  border: 1.5px solid rgba(201,169,110,.4);
  background: white; border-radius: 8px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); cursor: pointer; transition: all .2s;
  text-align: center;
}
.toggle-btn:hover { border-color: var(--crimson); color: var(--crimson); }
.toggle-btn.selected {
  background: var(--crimson); border-color: var(--crimson);
  color: white; font-weight: 700;
}

/* ══ USER BADGE ══ */
.user-badge {
  display: flex; align-items: center; gap: 12px;
  background: var(--green-bg);
  border: 1px solid rgba(46,125,82,.2);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 22px;
}
.badge-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 18px; flex-shrink: 0;
}
.badge-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 600; color: var(--green);
}
.badge-id {
  font-size: 12px; color: var(--muted); margin-top: 1px;
}

/* ══ ALERTS ══ */
.alert {
  padding: 12px 14px; border-radius: 8px;
  font-size: 13px; margin-top: 14px; display: none;
}
.alert.show { display: block; }
.alert-error   { background: var(--err-bg);  color: var(--err);  border: 1px solid rgba(139,26,26,.2); }
.alert-warn    { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(122,92,0,.2);  }

/* ══ LOADING SPINNER ══ */
.spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: white; border-radius: 50%;
  animation: spin .7s linear infinite; vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ SUCCESS STEP ══ */
.success-circle {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 36px; color: white;
  animation: pop .4s cubic-bezier(.17,.67,.44,1.4);
}
@keyframes pop {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.success-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 600; text-align: center;
  color: var(--green); margin-bottom: 6px;
}
.success-msg {
  font-size: 13px; color: var(--muted);
  text-align: center; margin-bottom: 20px;
}
.record-card {
  background: var(--ivory);
  border: 1px solid rgba(201,169,110,.3);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 22px;
}
.record-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 0; border-bottom: 1px solid rgba(201,169,110,.15);
  font-size: 13px;
}
.record-row:last-child { border: none; padding-bottom: 0; }
.record-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
}
.record-val { color: var(--text); font-weight: 700; }

/* ══ WARN STEP ══ */
.warn-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--warn-bg); border: 2px solid var(--warn);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 28px;
}

/* ══ RESPONSIVE ══ */
@media (max-width: 480px) {
  .card { padding: 28px 20px; border-radius: 12px; }
  .top-bar { padding: 14px 20px; }
}
</style>
</head>
<body>

<header class="top-bar">
  <a href="../" class="brand">
    Amorè N' More
    <span>WEDDING STUDIO</span>
  </a>
  <a href="../" class="back-link">← Home</a>
</header>

<main>
  <p class="page-title">Attendance</p>
  <p class="page-sub">Check-In &amp; Check-Out</p>

  <div class="card">

    <!-- ── STEP 1: Scan / Enter ID ─────────────────────────── -->
    <div id="step-scan" class="step active">
      <div class="step-icon">🪪</div>
      <p class="step-title">Identify Yourself</p>
      <p class="step-desc">Scan your QR code or type your ID below</p>

      <button id="camera-btn" class="scan-btn" onclick="toggleCamera()">📷 Scan QR Code</button>

      <div id="qr-reader">
        <video id="qr-video" autoplay playsinline muted></video>
        <div class="qr-overlay"><div class="qr-frame"></div></div>
      </div>

      <div class="divider">or enter manually</div>

      <div class="field">
        <label for="id-input">ID / QR Code</label>
        <input id="id-input" type="text" placeholder="e.g. STF-001 or CLT-042"
               autocomplete="off" spellcheck="false"
               onkeydown="if(event.key==='Enter') verifyId()">
      </div>

      <button class="btn-primary" onclick="verifyId()" id="verify-btn">Verify ID</button>

      <div id="scan-alert" class="alert alert-error"></div>
    </div>

    <!-- ── STEP 2: Attendance Form ─────────────────────────── -->
    <div id="step-form" class="step">
      <div class="user-badge">
        <div class="badge-icon">✓</div>
        <div>
          <div class="badge-name" id="badge-name">—</div>
          <div class="badge-id"   id="badge-id">—</div>
        </div>
      </div>

      <div class="field">
        <label for="purpose-select">Purpose</label>
        <select id="purpose-select" onchange="onPurposeChange()">
          <option value="">— Select Purpose —</option>
          <option value="Wedding Consultation">Wedding Consultation</option>
          <option value="Makeup and Hair">Makeup and Hair</option>
          <option value="Photoshoot">Photoshoot</option>
          <option value="Decoration">Decoration</option>
          <option value="Cleanup">Cleanup</option>
          <option value="Dress Rentals">Dress Rentals</option>
          <option value="Others">Others</option>
        </select>
      </div>

      <div class="field" id="other-field" style="display:none">
        <label for="purpose-other">Specify Purpose</label>
        <input id="purpose-other" type="text" placeholder="Describe the purpose…">
      </div>

      <div class="field">
        <label>Time Record</label>
        <div class="toggle-row">
          <button class="toggle-btn selected" id="btn-in"  onclick="selectType('in')">⬆ Time In</button>
          <button class="toggle-btn"          id="btn-out" onclick="selectType('out')">⬇ Time Out</button>
        </div>
      </div>

      <button class="btn-primary" id="submit-btn" onclick="submitForm()">Record Attendance</button>
      <div id="form-alert" class="alert alert-error"></div>
      <button class="btn-link" onclick="resetToScan()">← Change ID</button>
    </div>

    <!-- ── STEP 3: Missing Time In ─────────────────────────── -->
    <div id="step-missing" class="step">
      <div class="warn-circle">⚠️</div>
      <p class="step-title" style="color:var(--warn)">No Time In Found</p>
      <p class="step-desc">No open Time In record exists for your ID.<br>Please enter your approximate Time In to continue.</p>

      <div class="field">
        <label for="manual-timein">Time In</label>
        <input id="manual-timein" type="datetime-local">
      </div>

      <button class="btn-primary" onclick="submitWithManualTimeIn()">Confirm &amp; Save</button>
      <div id="missing-alert" class="alert alert-error"></div>
      <button class="btn-link" onclick="showStep('step-form')">← Back</button>
    </div>

    <!-- ── STEP 4: Success ─────────────────────────────────── -->
    <div id="step-success" class="step">
      <div class="success-circle">✓</div>
      <p class="success-title" id="success-title">Recorded!</p>
      <p class="success-msg"   id="success-msg"></p>

      <div class="record-card" id="record-card"></div>

      <button class="btn-primary" onclick="resetToScan()">New Entry</button>
    </div>

  </div><!-- /card -->
</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════
let scriptUrl  = '';
let user       = null;   // { id, name }
let recordType = 'in';   // 'in' | 'out'
let cameraActive = false;
let cameraStream = null;
let qrInterval   = null;

// ── Load config ──────────────────────────────────────────────
fetch('../config.json')
  .then(r => r.json())
  .then(cfg => {
    // attendance reuses the same deployment as bookings (doGet vs doPost)
    scriptUrl = cfg.attendanceScriptUrl || cfg.bookingScriptUrl || '';
  })
  .catch(() => {});

// ── Utilities ────────────────────────────────────────────────
function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function clearAlert(id) {
  const el = document.getElementById(id);
  el.textContent = '';
  el.classList.remove('show');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn._orig = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Please wait…';
  } else {
    btn.disabled = false;
    btn.innerHTML = btn._orig || btn.textContent;
  }
}

async function api(params) {
  if (!scriptUrl) throw new Error('Attendance script URL not configured in config.json');
  const url = scriptUrl + '?' + new URLSearchParams(params).toString();
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Network error ' + resp.status);
  return resp.json();
}

// ─── Format datetime-local value ─────────────────────────────
function fmtDatetimeLocal(val) {
  // "2026-05-27T09:30" → "2026-05-27 09:30:00"
  return val.replace('T', ' ') + ':00';
}

// ─── Format ISO-ish string nicely ────────────────────────────
function fmtTime(ts) {
  if (!ts) return '—';
  // ts is "yyyy-MM-dd HH:mm:ss"
  const d = new Date(ts.replace(' ', 'T'));
  if (isNaN(d)) return ts;
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts.replace(' ', 'T'));
  if (isNaN(d)) return ts;
  return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
}

// ═══════════════════════════════════════════════════════════════
//  Camera / QR Scanner
// ═══════════════════════════════════════════════════════════════
async function toggleCamera() {
  cameraActive ? stopCamera() : startCamera();
}

async function startCamera() {
  const reader = document.getElementById('qr-reader');
  const video  = document.getElementById('qr-video');
  const btn    = document.getElementById('camera-btn');

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    video.srcObject = cameraStream;
    reader.style.display = 'block';
    btn.textContent = '⏹ Stop Camera';
    btn.classList.add('active');
    cameraActive = true;
    startQrLoop(video);
  } catch (err) {
    showAlert('scan-alert', 'Camera not available: ' + err.message + '. Please enter ID manually.');
  }
}

function stopCamera() {
  const reader = document.getElementById('qr-reader');
  const btn    = document.getElementById('camera-btn');
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  if (qrInterval)   { clearInterval(qrInterval); qrInterval = null; }
  reader.style.display = 'none';
  btn.textContent = '📷 Scan QR Code';
  btn.classList.remove('active');
  cameraActive = false;
}

// Use BarcodeDetector API (supported in Chrome/Android) or canvas fallback
function startQrLoop(video) {
  if ('BarcodeDetector' in window) {
    const detector = new BarcodeDetector({ formats: ['qr_code'] });
    qrInterval = setInterval(async () => {
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          const val = codes[0].rawValue;
          stopCamera();
          document.getElementById('id-input').value = val;
          verifyId(val);
        }
      } catch (_) {}
    }, 400);
  } else {
    // Canvas-based fallback via jsQR (loaded dynamically)
    loadJsQr().then(() => {
      const canvas = document.createElement('canvas');
      const ctx    = canvas.getContext('2d', { willReadFrequently: true });
      qrInterval = setInterval(() => {
        if (!video.videoWidth) return;
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if (code && code.data) {
          stopCamera();
          document.getElementById('id-input').value = code.data;
          verifyId(code.data);
        }
      }, 400);
    }).catch(() => {
      showAlert('scan-alert', 'QR scanning not supported in this browser. Please enter ID manually.');
      stopCamera();
    });
  }
}

let jsQrLoaded = false;
function loadJsQr() {
  if (jsQrLoaded) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    s.onload  = () => { jsQrLoaded = true; resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ═══════════════════════════════════════════════════════════════
//  Step 1 — Verify ID
// ═══════════════════════════════════════════════════════════════
async function verifyId(overrideId) {
  clearAlert('scan-alert');
  const raw = (overrideId || document.getElementById('id-input').value || '').trim();
  if (!raw) { showAlert('scan-alert', 'Please enter or scan your ID.'); return; }

  setLoading('verify-btn', true);
  try {
    const data = await api({ action: 'lookup', id: raw });
    if (data.ok) {
      user = { id: data.id, name: data.name };
      document.getElementById('badge-name').textContent = data.name;
      document.getElementById('badge-id').textContent   = 'ID: ' + data.id;
      clearAlert('form-alert');
      resetTypeToggle();
      document.getElementById('purpose-select').value = '';
      document.getElementById('purpose-other').value  = '';
      document.getElementById('other-field').style.display = 'none';
      showStep('step-form');
    } else {
      showAlert('scan-alert', data.error || 'ID not found.');
    }
  } catch (err) {
    showAlert('scan-alert', err.message);
  } finally {
    setLoading('verify-btn', false);
  }
}

// ═══════════════════════════════════════════════════════════════
//  Step 2 — Attendance Form
// ═══════════════════════════════════════════════════════════════
function selectType(type) {
  recordType = type;
  document.getElementById('btn-in').classList.toggle('selected',  type === 'in');
  document.getElementById('btn-out').classList.toggle('selected', type === 'out');
}

function resetTypeToggle() {
  recordType = 'in';
  document.getElementById('btn-in').classList.add('selected');
  document.getElementById('btn-out').classList.remove('selected');
}

function onPurposeChange() {
  const v = document.getElementById('purpose-select').value;
  document.getElementById('other-field').style.display = v === 'Others' ? 'block' : 'none';
}

function getPurpose() {
  const sel = document.getElementById('purpose-select').value;
  if (sel === 'Others') {
    return document.getElementById('purpose-other').value.trim() || 'Others';
  }
  return sel;
}

async function submitForm() {
  clearAlert('form-alert');
  const purpose = getPurpose();
  if (!purpose) { showAlert('form-alert', 'Please select a purpose.'); return; }

  setLoading('submit-btn', true);
  try {
    const data = await api({
      action:  'record',
      id:      user.id,
      name:    user.name,
      purpose: purpose,
      type:    recordType
    });
    handleRecordResponse(data, purpose);
  } catch (err) {
    showAlert('form-alert', err.message);
  } finally {
    setLoading('submit-btn', false);
  }
}

function handleRecordResponse(data, purpose) {
  if (data.ok) {
    showSuccess(data, purpose);
  } else if (data.needTimeIn) {
    // Pre-fill datetime-local with current time minus 1 hour as helpful default
    const now = new Date(Date.now() - 3600000);
    const pad = n => String(n).padStart(2, '0');
    const localDefault =
      now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) +
      'T' + pad(now.getHours()) + ':' + pad(now.getMinutes());
    document.getElementById('manual-timein').value = localDefault;
    clearAlert('missing-alert');
    showStep('step-missing');
  } else {
    showAlert('form-alert', data.error || 'Failed to record attendance.');
  }
}

// ═══════════════════════════════════════════════════════════════
//  Step 3 — Manual Time In
// ═══════════════════════════════════════════════════════════════
async function submitWithManualTimeIn() {
  clearAlert('missing-alert');
  const val = document.getElementById('manual-timein').value;
  if (!val) { showAlert('missing-alert', 'Please select a Time In date and time.'); return; }

  const purpose = getPurpose();
  setLoading('submit-btn', true);

  // The submit button in this step doesn't have id="submit-btn";
  // we re-use a generic approach
  const btn = document.querySelector('#step-missing .btn-primary');
  btn.disabled = true;
  btn._orig = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  try {
    const data = await api({
      action:       'record',
      id:           user.id,
      name:         user.name,
      purpose:      purpose,
      type:         'out',
      manualTimeIn: val
    });
    if (data.ok) {
      showSuccess(data, purpose, fmtDatetimeLocal(val));
    } else {
      showAlert('missing-alert', data.error || 'Failed to record.');
    }
  } catch (err) {
    showAlert('missing-alert', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = btn._orig;
  }
}

// ═══════════════════════════════════════════════════════════════
//  Step 4 — Success
// ═══════════════════════════════════════════════════════════════
function showSuccess(data, purpose, manualTimeIn) {
  const isIn  = recordType === 'in';
  const label = isIn ? 'Time In' : 'Time Out';

  document.getElementById('success-title').textContent = label + ' Recorded';
  document.getElementById('success-msg').textContent   = data.message || 'Attendance saved successfully.';

  const now = new Date();
  const nowTs = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  const timeIn  = isIn  ? data.time : (data.timeIn  || manualTimeIn || '—');
  const timeOut = !isIn ? data.time : '';

  const rows = [
    ['Name',    user.name],
    ['ID',      user.id],
    ['Purpose', purpose],
    ['Date',    fmtDate(data.time || nowTs)],
    ['Time In', fmtTime(timeIn)],
  ];
  if (timeOut) rows.push(['Time Out', fmtTime(timeOut)]);

  document.getElementById('record-card').innerHTML = rows.map(([l, v]) =>
    `<div class="record-row">
       <span class="record-label">${l}</span>
       <span class="record-val">${v}</span>
     </div>`
  ).join('');

  showStep('step-success');
}

// ═══════════════════════════════════════════════════════════════
//  Reset
// ═══════════════════════════════════════════════════════════════
function resetToScan() {
  stopCamera();
  user = null;
  document.getElementById('id-input').value = '';
  clearAlert('scan-alert');
  showStep('step-scan');
}
</script>
